# ── DNS dinâmico — re-resolve a cada 10s usando o resolver interno do Docker ──
# Sem isso o nginx cacheia o IP no startup e quebra quando containers reiniciam.
resolver 127.0.0.11 valid=10s ipv6=off;

# ── Rate limiting ─────────────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api_limit:10m    rate=60r/m;
limit_req_zone $binary_remote_addr zone=auth_limit:10m   rate=10r/m;

# upload_limit applies only to POST (file uploads). When $upload_rate_key is ""
# (all other methods), nginx skips rate limiting for that zone entirely.
map $request_method $upload_rate_key {
    POST    $binary_remote_addr;
    default "";
}
limit_req_zone $upload_rate_key zone=upload_limit:10m rate=5r/m;

# ── Headers de segurança compartilhados ──────────────────────────────────────
add_header X-Frame-Options          "SAMEORIGIN"          always;
add_header X-Content-Type-Options   "nosniff"             always;
add_header X-XSS-Protection         "1; mode=block"       always;
add_header Referrer-Policy          "strict-origin-when-cross-origin" always;

# ─────────────────────────────────────────────────────────────────────────────
# Servidor principal — porta 80
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name localhost _;

    # Variáveis forçam o nginx a usar o resolver acima em cada request
    set $upstream_api      crm-api:8001;
    set $upstream_frontend crm-frontend:80;

    # ── Proxy headers globais ─────────────────────────────────────────────────
    proxy_http_version      1.1;
    proxy_set_header Host               $host;
    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto  $scheme;
    proxy_set_header X-Request-ID       $request_id;

    # ── WebSocket — /ws/* ─────────────────────────────────────────────────────
    location /ws/ {
        proxy_pass http://$upstream_api;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_buffering     off;
        access_log off;
    }

    # ── Auth endpoints — rate limit estrito ──────────────────────────────────
    location ~ ^/api/v1/auth/(login|register) {
        limit_req zone=auth_limit burst=5 nodelay;
        proxy_pass http://$upstream_api;
        proxy_read_timeout 30s;
    }

    # ── Upload endpoints ──────────────────────────────────────────────────────
    location ~ ^/api/v1/(quote-templates|agents/rag/documents) {
        limit_req zone=upload_limit burst=3 nodelay;
        client_max_body_size 100m;
        proxy_pass         http://$upstream_api;
        proxy_read_timeout 120s;
        proxy_request_buffering off;
    }

    # ── API geral ─────────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass         http://$upstream_api;
        proxy_read_timeout 60s;
        proxy_connect_timeout 5s;
    }

    # ── Health check ──────────────────────────────────────────────────────────
    location = /health {
        proxy_pass http://$upstream_api/health;
        access_log off;
    }

    # ── Assets estáticos com hash — cache agressivo ───────────────────────────
    location ~* /assets/ {
        proxy_pass http://$upstream_frontend;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # ── Frontend SPA ──────────────────────────────────────────────────────────
    location / {
        proxy_pass http://$upstream_frontend;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── Status interno nginx ──────────────────────────────────────────────────
    location = /nginx-status {
        stub_status on;
        allow 127.0.0.1;
        allow 172.0.0.0/8;
        deny  all;
        access_log off;
    }
}
