version: "3.9"

networks:
  agent-network:
    name: agents_default
    external: false   # cria se não existir; se agents já estiver no ar, reutiliza

volumes:
  crm-postgres-data:
  minio-data:
  rabbitmq-data:

services:
  crm-api:
    build: .
    container_name: crm-api
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - CRM_DATABASE_URL=postgresql+asyncpg://postgres:postgres@crm-postgres:5432/crm
      - REDIS_URL=redis://redis:6379/1
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - AGENTS_API_URL=http://agent:8000
      - AGENTS_DIR=/app/shared-agents
      - GATEWAY_URL=http://gateway:3000
      - GATEWAY_API_KEY=${GATEWAY_API_KEY:-}
      - MINIO_URL=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - QDRANT_URL=http://qdrant:6333
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - SMTP_HOST=${SMTP_HOST:-smtp-relay.brevo.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - EMAIL_FROM=${EMAIL_FROM:-OPS Solutions <suporte@ops.solutions.com>}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ../agents/agents:/app/shared-agents:rw
    networks:
      - agent-network
    depends_on:
      crm-postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_started

  crm-postgres:
    image: postgres:16-alpine
    container_name: crm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: crm
    ports:
      - "5433:5432"
    volumes:
      - crm-postgres-data:/var/lib/postgresql/data
    networks:
      - agent-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: crm-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - agent-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 10s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: crm-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - agent-network

  crm-frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        # Vazio = URL relativa: chamadas /api/... vão pelo nginx na porta 80
        VITE_API_URL: ${VITE_API_URL:-}
    container_name: crm-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    networks:
      - agent-network
    depends_on:
      crm-api:
        condition: service_started
