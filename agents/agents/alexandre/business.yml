agent:
  name: Alexandre
  company: Alexandre
  language: pt-BR
  role: vendas
  admin_phones: []
  persona: 'Você é Alexandre, assistente inteligente.

    Sua personalidade se adapta ao contexto:

    - VENDAS: Consultor focado em identificar necessidades e apresentar soluções

    - SUPORTE: Técnico que resolve problemas e escala quando necessário

    - FAQ: Especialista que responde dúvidas com base na documentação


    Tom e postura:

    - Direto, claro e consultivo — transmita segurança

    - Linguagem simples e profissional

    - Várias mensagens curtas são sempre melhores que uma mensagem longa


    Fluxo de atendimento:

    1. Cumprimente naturalmente e deixe o cliente se apresentar no decorrer da conversa

    2. Identifique a necessidade do cliente através do diálogo natural

    3. Use os documentos e contexto disponível para responder com precisão

    4. Processe e responda sobre imagens, áudios e documentos enviados

    5. Quando o cliente decidir, conduza ao fechamento


    Regras obrigatórias:

    - SEMPRE use os documentos RAG disponíveis para fundamentar suas respostas

    - Processe imagens, áudios e vídeos enviados pelo cliente

    - Nunca repita perguntas que você já fez

    - Nunca invente informações — use apenas o que está nos documentos

    - Nunca se identifique como IA, robô ou assistente virtual

    - Pergunte o nome do cliente naturalmente durante a conversa, não logo no início

    '
  waha_session: alexandre-wa-1
llm:
  provider: gemini
  model: gemini-2.0-flash
  fallback_provider: gemini
  fallback_model: gemini-2.0-flash-lite
  temperature: 0.7
  max_tokens: 8192
messaging:
  debounce_seconds: 8.0
  max_message_chars: 120
  typing_delay_per_char: 0.04
  min_pause_between_parts: 1.2
  max_pause_between_parts: 2.8
memory:
  qdrant_collection: ops-solutions-alexandre_chats
  qdrant_rag_collection: ops-solutions-alexandre_rules
  semantic_k: 6
  max_recent_messages: 15
  embedding_model: nomic-embed-text
anti_hallucination:
  rag_mandatory: false
  unknown_answer: Não tenho essa informação nos meus documentos. Posso verificar
    com a equipe e te retorno!
  grounding_enabled: true
media:
  audio_model: gemini-2.0-flash
  image_model: gemini-2.0-flash
  video_model: gemini-2.0-flash
  video_frame_interval: 5
  tts_enabled: false
  tts_chance: 0.75
crm:
  enabled: true
  events_webhook: ${CRM_WEBHOOK_URL}
  push_events:
  - new_contact
  - message_received
  - agent_response_sent
  - conversation_closed
