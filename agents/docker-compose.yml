version: "3.9"

networks:
  agent-network:
    driver: bridge

volumes:
  redis-data:
  qdrant-data:
  postgres-data:
  ollama-data:
  gateway-auth:


services:
  redis:
    image: redis:7-alpine
    container_name: whatsapp-agent-redis
    restart: unless-stopped
    command: >
      redis-server
      --notify-keyspace-events KEA
      --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - agent-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  qdrant:
    image: qdrant/qdrant:latest
    container_name: whatsapp-agent-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - agent-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  postgres:
    image: postgres:16-alpine
    container_name: whatsapp-agent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: whatsapp_agent
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - agent-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d whatsapp_agent"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  gateway:
    build: ./gateway
    container_name: whatsapp-gateway
    restart: unless-stopped
    environment:
      WEBHOOK_URL: ${WEBHOOK_URL:-http://agent:8000/webhook}
      PORT: "3000"
      SESSION_NAME: ${SESSION_NAME:-default}
      API_KEY: ${WAHA_API_KEY:-adminops}
      AUTH_DIR: /app/auth
      LOG_LEVEL: info
    ports:
      - "3000:3000"
    volumes:
      - gateway-auth:/app/auth
    networks:
      - agent-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  ollama:
    image: ollama/ollama:latest
    container_name: whatsapp-agent-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
      - ./scripts/download_models.sh:/download_models.sh:ro
    networks:
      - agent-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_NUM_PARALLEL=1
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama serve &
        OLLAMA_PID=$!
        echo "⏳ Aguardando Ollama iniciar..."
        sleep 10
        echo "📥 Baixando modelos..."
        ollama pull llama3.1:8b || true
        ollama pull nomic-embed-text || true
        echo "✅ Modelos baixados!"
        wait $OLLAMA_PID

  agent:
    build: .
    container_name: whatsapp-agent-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - AGENT_IDS=${AGENT_IDS:-ops_solutions,maya,snowden}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/whatsapp_agent
      - WAHA_URL=http://gateway:3000
      - WAHA_API_KEY=${WAHA_API_KEY:-adminops}
      - OLLAMA_URL=http://ollama:11434
      - LOG_LEVEL=INFO
      - LOG_JSON=false
    volumes:
      - ./agents:/app/agents
    networks:
      - agent-network
    depends_on:
      - redis
      - qdrant
      - postgres
      - gateway
      - ollama
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
